version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: sentinelai-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=sentinel_ai
    networks:
      - sentinelai-network

  # Redis Cache & Pub/Sub
  redis:
    image: redis:7-alpine
    container_name: sentinelai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sentinelai-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentinelai-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DB_NAME=sentinel_ai
      - REDIS_URL=redis://redis:6379
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend:/app
    networks:
      - sentinelai-network
    # For development - auto-reload on file changes
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  mongodb_data:
  redis_data:

networks:
  sentinelai-network:
    driver: bridge
